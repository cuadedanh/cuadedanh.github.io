name: Kodi Repo & Zip Generator

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'index.html'
      - 'addons.xml'
      - 'addons.xml.md5'
      - '*.zip'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công từ tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kodi Repo
        uses: actions/checkout@v3

      # --- LẤY ADDON TỪ REPO KHÁC CỦA BẠN ---
      - name: Clone Your Own Addon
        run: |
          # Thay 'username' và 'ten-repo-addon' bằng thông tin thật của bạn
          git clone --depth 1 https://github.com temp_addon
          
          # Xóa thư mục .git để tránh lỗi xung đột giữa 2 repo
          rm -rf temp_addon/.git
          
          # Di chuyển nội dung addon ra thư mục gốc để nén (ví dụ đặt tên thư mục là plugin.video.name)
          # Lưu ý: Thay 'plugin.video.name' bằng đúng ID addon của bạn
          mkdir -p plugin.video.name
          cp -r temp_addon/* plugin.video.name/
          rm -rf temp_addon
      # --- KẾT THÚC ---

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Auto Zip and Generate Metadata
        run: |
          python - <<EOF
          import os
          import hashlib
          import zipfile

          exclude = ['.git', '.github', 'index.html', 'README.md', 'LICENSE', 'addons.xml', 'addons.xml.md5']
          addons_xml = u"<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<addons>\n"

          # 1. Quét các thư mục (bao gồm cả thư mục vừa clone về) để nén
          for dir_name in os.listdir('.'):
              if os.path.isdir(dir_name) and dir_name not in exclude:
                  xml_path = os.path.join(dir_name, 'addon.xml')
                  if os.path.exists(xml_path):
                      with open(xml_path, 'r', encoding='utf-8') as f:
                          content = f.read()
                          if "<?xml" in content:
                              content = content.split('?>', 1)[-1].strip()
                          addons_xml += content + "\n"
                      
                      zip_name = f"{dir_name}.zip"
                      with zipfile.ZipFile(zip_name, 'w', zipfile.ZIP_DEFLATED) as zipf:
                          for root, dirs, files in os.walk(dir_name):
                              for file in files:
                                  zipf.write(os.path.join(root, file), os.path.relpath(os.path.join(root, file), os.path.join(dir_name, '..')))

          addons_xml += u"</addons>\n"

          # 2. Xuất file hệ thống Kodi
          with open("addons.xml", "w", encoding="utf-8") as f:
              f.write(addons_xml)
          
          md5_hash = hashlib.md5(addons_xml.encode('utf-8')).hexdigest()
          with open("addons.xml.md5", "w") as f:
              f.write(md5_hash)

          # 3. Tạo Index.html liệt kê TẤT CẢ file .zip
          all_zips = [f for f in os.listdir('.') if f.endswith('.zip')]
          all_zips.sort()

          html = "<html><head><title>My Kodi Repository</title></head><body>"
          html += "<h1>Index of Kodi Addons</h1><hr><pre>"
          for zip_file in all_zips:
              html += f'<a href="{zip_file}">{zip_file}</a>\n'
          html += "</pre><hr></body></html>"
          
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add addons.xml addons.xml.md5 index.html *.zip
          # Nếu bạn muốn lưu cả thư mục code addon lại trong repo chính, hãy thêm dòng: git add plugin.video.name
          git commit -m "Auto-update Repo with external addon" || exit 0
          git push
